<!-- ── Digitally Agency — Roaster Component ────────────────────────────────── -->
<section id="roaster">
    <div class="sec-lbl">// THE TRUTH ENGINE</div>
    <h2 class="sec-t rv">AI Website <span style="color:var(--red)">Roaster</span></h2>
    <div class="r-wrap rv">
        <div class="r-bar">
            <div class="r-dots">
                <div class="rd rd-r"></div>
                <div class="rd rd-y"></div>
                <div class="rd rd-g"></div>
            </div>
            <div class="r-title-bar">digitally://ai-diagnostic-engine/v4.0 — Powered by Groq</div>
        </div>
        <div class="r-body">
            <h3 class="r-h">Submit Your Site.<br>Uncover the <span class="fire" style="color:var(--cyan)">Truth.</span>
            </h3>
            <p class="r-sub">Powered by Groq & Llama 3. Data-driven insights revealing exactly what's bottlenecking your
                conversions and costing you customers.</p>
            <div class="url-row">
                <span class="url-pre">https://</span>
                <input type="text" id="url-in" placeholder="yourwebsite.com" />
                <button id="r-btn" class="btn-p"
                    style="border-radius:0; border:none; border-left: 1px solid var(--border2);"
                    onclick="startRoast()">ANALYZE SITE</button>
            </div>
            <div class="scan-log" id="scan-log"></div>
            <div class="r-result" id="r-result"></div>
        </div>
    </div>
</section>
